<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App | CodeByGaurav</title>
    <link rel="stylesheet" href="note-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2>Task Master <i class="fa-solid fa-bolt"></i></h2>
        <div class="input-wrapper">
            <input id="inp" type="text" placeholder="Enter task here.." autofocus="off">
            <i id="addBtn" class="fa-solid fa-plus"></i>
        </div>

        <ul class="task-list">
            <li>
                <p>Html</p>
                <div class="btns">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <i class="fa-solid fa-trash"></i>
                </div>
            </li>
        </ul>
    </div>
</body>
<script src="note-script.js"></script>
</html>
