<body>

     crossorigin="anonymous"></script>

     style="display:block"

     data-ad-slot="1951309947"

     data-full-width-responsive="true"></ins>

     (adsbygoogle = window.adsbygoogle || []).push({});

<h2>Your IP Information</h2>

<button onclick="getIP()">Check IP</button>

<div id="result"></div>

<script>

function getIP(){

fetch("https://ipapi.co/json/")

.then(res=>res.json())

.then(data=>{

document.getElementById("result").innerHTML=

"IP: "+data.ip+"<br>"+

"City: "+data.city+"<br>"+

"Country: "+data.country_name+"<br>"+

"ISP: "+data.org;

});

}

</script>

</body>
</html>
