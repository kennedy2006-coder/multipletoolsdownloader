<!DOCTYPE html>
<html>
<head>
<title>Study Timer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a href="study-tools.html">← Back</a>

<h2>Study Timer</h2>
<p>Use the Pomodoro technique for focused study sessions.</p>

<select id="session">

<option value="25">25 Minute Study</option>
<option value="50">50 Minute Study</option>
<option value="15">15 Minute Quick Review</option>

</select>

<br><br>

<button onclick="startTimer()">Start Timer</button>

<h3 id="timer">00:00</h3>

<script>

let interval;

function startTimer(){

let minutes=document.getElementById("session").value;

let seconds=minutes*60;

clearInterval(interval);

interval=setInterval(function(){

let m=Math.floor(seconds/60);
let s=seconds%60;

if(s<10) s="0"+s;

document.getElementById("timer").innerText=m+":"+s;

seconds--;

if(seconds<0){

clearInterval(interval);
alert("Session complete. Take a break.");

}

},1000);

}

</script>

</body>
</html>
