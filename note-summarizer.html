<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Note Summarizer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
color:#222;
margin-bottom:10px;
}

p{
text-align:center;
color:#555;
margin-bottom:30px;
}

textarea{
width:100%;
min-height:180px;
padding:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
resize:vertical;
}

button{
background:#2563eb;
color:white;
border:none;
padding:14px 25px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#1d4ed8;
}

.output{
margin-top:25px;
}

footer{
margin-top:60px;
background:#111;
color:#ccc;
padding:25px;
text-align:center;
font-size:14px;
}

footer a{
color:#4da3ff;
text-decoration:none;
margin:0 10px;
}

footer a:hover{
text-decoration:underline;
}

.back{
display:inline-block;
margin-bottom:20px;
color:#2563eb;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<a class="back" href="index.html">← Back to Tools</a>

<h1>AI Note Summarizer</h1>
<p>Paste your study notes and generate a clear AI summary.</p>

<textarea id="noteText" placeholder="Paste your lecture notes, research notes, or study material here..."></textarea>

<button onclick="summarize()">Summarize Notes</button>

<div class="output">
<textarea id="summary" placeholder="Your summarized notes will appear here..." readonly></textarea>
</div>

</div>

<footer>

<p>© 2026 Multiple Tools Downloader</p>

<p>
<a href="privacy.html">Privacy Policy</a>
<a href="terms.html">Terms</a>
<a href="contact.html">Contact</a>
</p>

</footer>


<script>

async function summarize(){

const text = document.getElementById("noteText").value;

if(text.length < 20){
alert("Please paste enough notes to summarize.");
return;
}

document.getElementById("summary").value="Generating summary...";

try{

const response = await fetch("/api/summarize",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({text:text})
});

const data = await response.json();

document.getElementById("summary").value=data.summary;

}catch(error){

document.getElementById("summary").value="Error generating summary.";

}

}

</script>

</body>
</html>
