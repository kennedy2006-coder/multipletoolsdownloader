<!DOCTYPE html>
<html>
<head>
<title>AI Note Summarizer</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:200px;
margin-top:10px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#2b6cb0;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<a href="index.html">← Back to Tools</a>

<h2>AI Note Summarizer</h2>

<p>Upload screenshots or PDF of notes and summarize them.</p>

<input type="file" id="fileInput" multiple accept="image/*,.pdf">

<br><br>

<textarea id="noteText" placeholder="Extracted text will appear here..."></textarea>

<br>

<button onclick="summarize()">Summarize Notes</button>

<h3>Summary</h3>

<textarea id="summary"></textarea>

</div>

  <script>

async function summarize(){

const text = document.getElementById("noteText").value;

if(text.length < 20){
alert("Please paste enough notes to summarize.");
return;
}

document.getElementById("summary").value = "Generating summary...";

try{

const response = await fetch("/api/summarize",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
text:text
})
});

const data = await response.json();

const result = data.candidates[0].content.parts[0].text;

document.getElementById("summary").value = result;

}catch(error){

document.getElementById("summary").value = "Error generating summary";

}

}

  </script>

</body>
</html>
