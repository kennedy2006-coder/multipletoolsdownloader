<!DOCTYPE html>
<html>
<head>

<title>MultiTools Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<!-- Adsense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8718351899149472"
crossorigin="anonymous"></script>

</head>

<body>

<header class="topbar">

<h1>MultiTools Hub</h1>

<input id="search" placeholder="Search tools..." onkeyup="searchTools()">

</header>



<!-- CATEGORY GRID -->

<div class="container">


<h2>Text Tools</h2>

<div class="grid">

<button onclick="showTool('word')">Word Counter</button>
<button onclick="showTool('char')">Character Counter</button>
<button onclick="showTool('duplicate')">Duplicate Line Remover</button>
<button onclick="showTool('case')">Case Converter</button>

</div>


<h2>Generators</h2>

<div class="grid">

<button onclick="showTool('password')">Password Generator</button>
<button onclick="showTool('identity')">Fake Identity Generator</button>
<button onclick="showTool('username')">Username Generator</button>
<button onclick="showTool('qr')">QR Code Generator</button>

</div>


<h2>Social Media</h2>

<div class="grid">

<button onclick="showTool('hashtags')">Hashtag Generator</button>
<button onclick="showTool('igbio')">Instagram Bio Generator</button>
<button onclick="showTool('tiktokcaption')">TikTok Caption Generator</button>
<button onclick="showTool('xcaption')">X Caption Generator</button>

</div>


<h2>Utilities</h2>

<div class="grid">

<button onclick="showTool('tts')">Text To Speech</button>
<button onclick="showTool('translator')">Translator</button>
<button onclick="showTool('passwordcheck')">Password Strength Checker</button>

</div>

</div>



<!-- TOOL PANEL -->

<div class="tool-panel">

<section id="word" class="tool">

<h3>Word Counter</h3>

<textarea id="text"></textarea>

<button onclick="countWords()">Count Words</button>

<p id="wordResult"></p>

</section>


<section id="password" class="tool">

<h3>Password Generator</h3>

<button onclick="generatePassword()">Generate Password</button>

<p id="passwordResult"></p>

</section>


<section id="identity" class="tool">

<h3>Fake Identity Generator</h3>

<button onclick="generateIdentity()">Generate</button>

<div id="identityResult"></div>

</section>


<section id="tts" class="tool">

<h3>Text To Speech</h3>

<textarea id="speechText"></textarea>

<button onclick="speak()">Speak</button>

</section>

</div>


<footer>

<p>© 2026 MultiTools Hub</p>

</footer>


<script src="app.js"></script>

</body>
</html>
