<div class="main">
  <!-- HOME -->
  <div id="home" class="toolPage" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <h1>Welcome to MultiTools Ultimate</h1>
      <p>Select a tool from the sidebar to get started.</p>
  </div>

  <!-- PASSWORD GENERATOR -->
  <div id="password" class="toolPage" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <h2>Password Generator</h2>
      <input type="number" id="passLength" placeholder="Enter length" value="12">
      <button onclick="generatePassword()">Generate</button>
      <input type="text" id="passwordOutput" readonly>
  </div>

  <!-- RANDOM NUMBER -->
  <div id="random" class="toolPage" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <h2>Random Number Generator</h2>
      <input type="number" id="min" placeholder="Min" value="0">
      <input type="number" id="max" placeholder="Max" value="100">
      <button onclick="randomNumber()">Generate</button>
      <p>Result: <span id="randomResult"></span></p>
  </div>
</div>
