<h2>Markdown Editor</h2>

<textarea id="markdown" style="width:100%;height:150px"></textarea>

<h3>Preview</h3>

<div id="preview"></div>

<script>

let textarea=document.getElementById("markdown");

textarea.addEventListener("input",function(){

document.getElementById("preview").innerHTML=marked.parse(textarea.value);

});

</script>
