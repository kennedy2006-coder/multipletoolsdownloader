<!DOCTYPE html>
<html>
<head>

<title>Image Compressor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

input{
margin-top:10px;
}

img{
max-width:100%;
margin-top:20px;
}

button{
padding:10px 20px;
margin-top:15px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>
<div class="ad">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8718351899149472"
     crossorigin="anonymous"></script>
<!-- Adbanner -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8718351899149472"
     data-ad-slot="1951309947"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
<h2>Image Compressor</h2>

<input type="file" id="upload">

<br>

<canvas id="canvas"></canvas>

<br>

<button onclick="compress()">Compress Image</button>

<br>

<a id="download">Download Compressed Image</a>

<script>

function compress(){

let file=document.getElementById("upload").files[0]

let reader=new FileReader()

reader.onload=function(e){

let img=new Image()

img.onload=function(){

let canvas=document.getElementById("canvas")

let ctx=canvas.getContext("2d")

canvas.width=img.width/2
canvas.height=img.height/2

ctx.drawImage(img,0,0,canvas.width,canvas.height)

let compressed=canvas.toDataURL("image/jpeg",0.6)

document.getElementById("download").href=compressed

document.getElementById("download").download="compressed.jpg"

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
