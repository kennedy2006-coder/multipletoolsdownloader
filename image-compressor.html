<h2>Image Compressor</h2>

<input type="file" id="upload">

<br>

<canvas id="canvas"></canvas>

<br>

<button onclick="compress()">Compress Image</button>

<br>

<a id="download">Download Compressed Image</a>

<script>

function compress(){

let file=document.getElementById("upload").files[0]

let reader=new FileReader()

reader.onload=function(e){

let img=new Image()

img.onload=function(){

let canvas=document.getElementById("canvas")

let ctx=canvas.getContext("2d")

canvas.width=img.width/2
canvas.height=img.height/2

ctx.drawImage(img,0,0,canvas.width,canvas.height)

let compressed=canvas.toDataURL("image/jpeg",0.6)

document.getElementById("download").href=compressed

document.getElementById("download").download="compressed.jpg"

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}

</script>
