<!DOCTYPE html>
<html>
<head>
<title>Flashcards Generator</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

input{
padding:10px;
width:90%;
margin:10px 0;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

.card{
background:white;
border-radius:10px;
height:200px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
margin-top:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
cursor:pointer;
}

</style>

</head>

<body>

<a href="index.html">← Back to Tools</a>

<div class="container">

<h2>Flashcards Generator</h2>

<input id="frontText" placeholder="Enter question / front text">

<input id="backText" placeholder="Enter answer / back text">

<br>

<button onclick="addCard()">Add Flashcard</button>

<div class="card" id="card" onclick="flipCard()">
No flashcard yet
</div>

<br>

<button onclick="prevCard()">Previous</button>
<button onclick="nextCard()">Next</button>

</div>

<script>

let cards=[];
let current=0;
let flipped=false;

function addCard(){

let front=document.getElementById("frontText").value;
let back=document.getElementById("backText").value;

if(front=="" || back==""){
alert("Enter both front and back text");
return;
}

cards.push({front:front,back:back});

current=cards.length-1;

showCard();

document.getElementById("frontText").value="";
document.getElementById("backText").value="";

}

function showCard(){

if(cards.length===0){
document.getElementById("card").innerHTML="No flashcard yet";
return;
}

flipped=false;

document.getElementById("card").innerHTML=cards[current].front;

}

function flipCard(){

if(cards.length===0) return;

if(!flipped){

document.getElementById("card").innerHTML=cards[current].back;
flipped=true;

}else{

document.getElementById("card").innerHTML=cards[current].front;
flipped=false;

}

}

function nextCard(){

if(cards.length===0) return;

current=(current+1)%cards.length;

showCard();

}

function prevCard(){

if(cards.length===0) return;

current=(current-1+cards.length)%cards.length;

showCard();

}

</script>

</body>
</html>
