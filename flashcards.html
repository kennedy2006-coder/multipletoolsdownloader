<!DOCTYPE html>
<html>
<head>
<title>Flashcards Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a href="study-tools.html">← Back</a>

<h2>Flashcards Generator</h2>

<input id="question" placeholder="Enter Question">
<br><br>

<input id="answer" placeholder="Enter Answer">
<br><br>

<button onclick="addCard()">Create Flashcard</button>

<div id="cards"></div>

<script>

function addCard(){

let q=document.getElementById("question").value;
let a=document.getElementById("answer").value;

let card=document.createElement("div");

card.style.border="1px solid #ccc";
card.style.padding="15px";
card.style.margin="10px";
card.style.cursor="pointer";

card.dataset.answer=a;

card.innerHTML="<b>"+q+"</b>";

card.onclick=function(){

this.innerHTML="<b>"+this.dataset.answer+"</b>";

}

document.getElementById("cards").appendChild(card);

}

</script>

</body>
</html>
