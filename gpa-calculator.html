<!DOCTYPE html>
<html>
<head>
<title>GPA Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a href="study-tools.html">← Back to Study Tools</a>

<h2>GPA Calculator</h2>

<input id="course" placeholder="Course Name">

<input id="grade" placeholder="Grade (A=4, B=3 etc)">

<input id="credit" placeholder="Credit Unit">

<br><br>

<button onclick="addCourse()">Add Course</button>

<button onclick="calculateGPA()">Calculate GPA</button>

<ul id="courses"></ul>

<h3 id="result"></h3>

<script>

let courses=[];

function addCourse(){

let grade=parseFloat(document.getElementById("grade").value);

let credit=parseFloat(document.getElementById("credit").value);

courses.push({grade,credit});

let li=document.createElement("li");

li.innerText="Grade:"+grade+" Credit:"+credit;

document.getElementById("courses").appendChild(li);

}

function calculateGPA(){

let totalPoints=0;
let totalCredits=0;

courses.forEach(c=>{

totalPoints+=c.grade*c.credit;
totalCredits+=c.credit;

});

let gpa=totalPoints/totalCredits;

document.getElementById("result").innerText="Your GPA: "+gpa.toFixed(2);

}

</script>

</body>
</html>
