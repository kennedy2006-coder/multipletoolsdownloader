<!DOCTYPE html>
<html>
<head>
<title>GPA Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a href="study-tools.html">← Back</a>

<h2>University GPA Calculator</h2>

<label>Select GPA Scale</label>

<select id="scale">

<option value="4">4.0 Scale</option>
<option value="5">5.0 Scale</option>

</select>

<br><br>

<input id="grade" placeholder="Grade Point">

<input id="credit" placeholder="Credit Unit">

<br><br>

<button onclick="addCourse()">Add Course</button>

<button onclick="calculateGPA()">Calculate GPA</button>

<ul id="courses"></ul>

<h3 id="result"></h3>

<script>

let courses=[];

function addCourse(){

let grade=parseFloat(document.getElementById("grade").value);
let credit=parseFloat(document.getElementById("credit").value);

courses.push({grade,credit});

let li=document.createElement("li");

li.innerText="Grade "+grade+" | Credit "+credit;

document.getElementById("courses").appendChild(li);

}

function calculateGPA(){

let points=0;
let credits=0;

courses.forEach(c=>{

points+=c.grade*c.credit;
credits+=c.credit;

});

let gpa=points/credits;

document.getElementById("result").innerText="Your GPA: "+gpa.toFixed(2);

}

</script>

</body>
</html>
