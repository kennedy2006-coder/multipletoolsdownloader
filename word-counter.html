<h2>Word & Character Counter</h2>

<textarea id="text" placeholder="Type or paste text here..." oninput="countText()"></textarea>

<div>

<p>Words: <span id="words">0</span></p>
<p>Characters: <span id="chars">0</span></p>

</div>

<script>

function countText(){

let text=document.getElementById("text").value;

let words=text.trim().split(/\s+/).filter(Boolean);

document.getElementById("words").innerText=words.length;

document.getElementById("chars").innerText=text.length;

}

</script>
